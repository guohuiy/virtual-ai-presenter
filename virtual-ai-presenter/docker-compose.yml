version: '3.8'
services:
  orchestrator:
    build: ./virtual-ai-presenter/backend/orchestrator
    ports:
      - "8000:8000"
    depends_on:
      - lm
      - tts
      - media
      - auth
      - redis
      - postgres
    environment:
      - LM_URL=http://lm:8501/generate
      - TTS_URL=http://tts:8601/synthesize
      - MEDIA_URL=http://media:8701
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/presenter
      - AUTH_URL=http://auth:8801
      - JWT_SECRET=supersecret_for_local_dev
  lm:
    build: ./virtual-ai-presenter/backend/lm_inference
    ports:
      - "8501:8501"
  tts:
    build: ./virtual-ai-presenter/backend/tts_service
    ports:
      - "8601:8601"
  media:
    build: ./virtual-ai-presenter/backend/media_service
    ports:
      - "8701:8701"
  auth:
    build: ./virtual-ai-presenter/backend/auth_service
    ports:
      - "8801:8801"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/presenter
      - JWT_SECRET=supersecret_for_local_dev
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: presenter
    ports:
      - "5432:5432"
