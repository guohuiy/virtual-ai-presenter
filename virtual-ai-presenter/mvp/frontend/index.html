<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Virtual AI Presenter — MVP Demo</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #ui { position: absolute; left: 10px; top: 10px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 6px; }
    #canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
<div id="ui">
  <div>
    <label>Theme: <input id="theme" value="Demo theme" /></label>
  </div>
  <div>
    <textarea id="script" rows="6" cols="40">Hello everyone. This is a demo speech from the Virtual AI Presenter.</textarea>
  </div>
  <div>
    <button id="start">Start Session</button>
  </div>
  <div id="log"></div>
</div>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
const log = (s) => { const d = document.getElementById('log'); d.innerText += s + '\n'; d.scrollTop = d.scrollHeight; };

// Simple Three.js scene with a head and mouth that scales on viseme
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(window.innerWidth, window.innerHeight);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1.6,3);
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

const headGeo = new THREE.SphereGeometry(0.6, 32, 32);
const headMat = new THREE.MeshStandardMaterial({color: 0xffddcc});
const head = new THREE.Mesh(headGeo, headMat);
head.position.set(0,1.6,0);
scene.add(head);

const mouthGeo = new THREE.BoxGeometry(0.4, 0.1, 0.05);
const mouthMat = new THREE.MeshStandardMaterial({color: 0x333333});
const mouth = new THREE.Mesh(mouthGeo, mouthMat);
mouth.position.set(0,1.35,0.56);
scene.add(mouth);

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

// WebSocket interaction
let ws = null;
let sessionId = null;

document.getElementById('start').onclick = async () => {
  // Start session
  const resp = await fetch('/session/start', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({userId:'demo'})});
  const body = await resp.json();
  sessionId = body.sessionId;
  const wsUrl = `ws://localhost:8000/ws/${sessionId}`;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    log('ws open');
    const script = document.getElementById('script').value;
    ws.send(JSON.stringify({type:'submit', theme: document.getElementById('theme').value, script, voice:{name:'demo'}}));
  };
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if(msg.type === 'lm_partial'){
      log(`LM: ${msg.data.textChunk}`);
    } else if(msg.type === 'viseme'){
      log(`Viseme: ${msg.data.phoneme} ${msg.data.startMs}-${msg.data.endMs}`);
      // Animate mouth: open for duration
      const dur = (msg.data.endMs - msg.data.startMs) / 1000;
      mouth.scale.y = 4.0;
      setTimeout(()=> mouth.scale.y = 1.0, dur*1000);
      // Play simple tone for visualization
      playToneForPhoneme(msg.data.phoneme, dur);
    } else if(msg.type === 'meta_end'){
      log('Finished. Recording: ' + msg.data.recordingUrl);
    }
  };
  ws.onclose = () => log('ws closed');
};

// Simple WebAudio tone generator mapped to phoneme
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playToneForPhoneme(p, duration){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const freq = 220 + (p.charCodeAt(0) % 100);
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
  osc.start();
  setTimeout(()=>{
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    osc.stop(audioCtx.currentTime + 0.06);
  }, duration*1000);
}
</script>
</body>
</html>
