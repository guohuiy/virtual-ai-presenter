<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="集成大模型AI的3D虚拟人演讲平台" />
    <title>AI虚拟人演讲者</title>
  </head>
  <body class="bg-gray-900 text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Loading overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
      <div class="text-center">
        <div class="w-16 h-16 border-4 border-primary-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <p class="text-lg font-medium text-gray-300">加载中...</p>
        <p class="text-sm text-gray-400 mt-2">正在初始化3D虚拟人和AI系统</p>
      </div>
    </div>

    <script>
      // Hide loading overlay when app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const overlay = document.getElementById('loading-overlay');
          if (overlay) {
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.5s ease';
            setTimeout(() => overlay.remove(), 500);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
