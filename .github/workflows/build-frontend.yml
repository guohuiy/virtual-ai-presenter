name: Build frontend

on:
  push:
    branches: [ master ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd virtual-ai-presenter/frontend
          npm ci

      - name: Build frontend
        run: |
          cd virtual-ai-presenter/frontend
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: virtual-ai-presenter/frontend/dist

